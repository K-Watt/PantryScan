<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PantryScan – Todos</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="stylesheet" href="ui/theme.css" />
  <style>
    /* ── Layout ─────────────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      height: calc(100vh - 0px);
      overflow: hidden;
    }

    /* ── Lists sidebar ───────────────────────────────────────────────────── */
    .lists-panel {
      width: 220px;
      min-width: 220px;
      background: #0d1320;
      border-right: 1px solid rgba(59,130,246,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .lists-panel-hdr {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(59,130,246,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .lists-panel-hdr h2 {
      font-size: 0.97rem;
      font-weight: 700;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .new-list-btn {
      background: none;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 6px;
      color: #60a5fa;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 3px 8px;
      transition: background .15s;
    }
    .new-list-btn:hover { background: rgba(59,130,246,0.15); }
    .lists-panel-body { flex: 1; overflow-y: auto; padding: 8px; }
    .lists-panel-body::-webkit-scrollbar { width: 4px; }
    .lists-panel-body::-webkit-scrollbar-track { background: transparent; }
    .lists-panel-body::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 2px; }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.87rem;
      color: #9ca3af;
      transition: background .15s, color .15s;
    }
    .list-item:hover { background: rgba(255,255,255,0.05); color: #e5e7eb; }
    .list-item.active { background: rgba(59,130,246,0.15); color: #60a5fa; font-weight: 600; }
    .list-item-name { display: flex; align-items: center; gap: 7px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .list-count {
      font-size: 0.73rem;
      background: rgba(59,130,246,0.2);
      color: #93c5fd;
      border-radius: 999px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .lists-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 6px 0; }

    /* ── Main content ────────────────────────────────────────────────────── */
    .todos-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .todos-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 10px;
      border-bottom: 1px solid rgba(59,130,246,0.12);
      flex-shrink: 0;
    }
    .todos-header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e5e7eb;
      flex: 1;
    }
    .filter-btns { display: flex; gap: 6px; }
    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 7px;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 4px 12px;
      transition: background .15s, color .15s;
    }
    .filter-btn.active { background: rgba(59,130,246,0.2); color: #60a5fa; border-color: rgba(59,130,246,0.5); }

    /* Quick-add bar */
    .quick-add-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(59,130,246,0.1);
      flex-shrink: 0;
    }
    .qa-title-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 0.9rem;
      padding: 8px 12px;
      outline: none;
    }
    .qa-title-input:focus { border-color: #3b82f6; }
    .qa-date-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 0.82rem;
      padding: 8px 10px;
      outline: none;
      width: 140px;
    }
    .qa-prio-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 0.82rem;
      padding: 8px 10px;
      outline: none;
    }
    .qa-prio-select option { background: #0d1320; }
    .qa-add-btn {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.87rem;
      font-weight: 600;
      padding: 8px 18px;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .qa-add-btn:hover { opacity: 0.88; }

    /* Todo list */
    .todos-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }
    .todos-list-wrap::-webkit-scrollbar { width: 5px; }
    .todos-list-wrap::-webkit-scrollbar-track { background: transparent; }
    .todos-list-wrap::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 2px; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(59,130,246,0.12);
      border-radius: 10px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.03);
      transition: border-color .15s, background .15s;
    }
    .todo-item:hover { border-color: rgba(59,130,246,0.3); background: rgba(255,255,255,0.055); }
    .todo-item.completed { opacity: 0.5; }
    .todo-item.completed .todo-title { text-decoration: line-through; color: #6b7280; }

    .todo-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.5);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: background .15s, border-color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: transparent;
    }
    .todo-check.checked {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }

    .todo-body { flex: 1; min-width: 0; }
    .todo-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .todo-title { font-size: 0.9rem; color: #e5e7eb; }
    .prio-badge {
      font-size: 0.68rem;
      font-weight: 700;
      border-radius: 5px;
      padding: 1px 6px;
      flex-shrink: 0;
    }
    .prio-1 { background: rgba(107,114,128,0.2); color: #9ca3af; }
    .prio-2 { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .prio-3 { background: rgba(239,68,68,0.2); color: #f87171; }
    .todo-meta { font-size: 0.76rem; color: #6b7280; }
    .todo-due-overdue { color: #f87171; }

    .todo-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity .15s;
    }
    .todo-item:hover .todo-actions { opacity: 1; }
    .todo-action-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #6b7280;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 3px 7px;
      transition: background .12s, color .12s;
    }
    .todo-action-btn:hover { background: rgba(255,255,255,0.07); color: #e5e7eb; }
    .todo-action-btn.del:hover { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.3); }

    .empty-state {
      text-align: center;
      color: #374151;
      padding: 40px 0;
      font-size: 0.9rem;
    }
    .section-hdr {
      font-size: 0.75rem;
      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin: 14px 0 6px;
    }

    /* ── Edit modal ──────────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #0f1a2e;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 14px;
      padding: 24px 28px;
      width: 380px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h2 { font-size: 1rem; font-weight: 700; color: #e5e7eb; margin-bottom: 16px; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 0.78rem; color: #9ca3af; margin-bottom: 4px; }
    .modal-input, .modal-select, .modal-textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 7px;
      color: #e5e7eb;
      font-size: 0.87rem;
      padding: 8px 10px;
      outline: none;
      font-family: inherit;
    }
    .modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: #3b82f6; }
    .modal-select option { background: #0d1320; }
    .modal-textarea { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
    .btn-cancel {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 7px 18px;
    }
    .btn-save {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none;
      border-radius: 7px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 18px;
    }
    .btn-save:hover { opacity: 0.88; }

    /* New list inline input */
    .new-list-input-wrap {
      padding: 8px;
      display: none;
    }
    .new-list-input-wrap.show { display: block; }
    .new-list-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 7px;
      color: #e5e7eb;
      font-size: 0.85rem;
      padding: 6px 10px;
      outline: none;
      margin-bottom: 5px;
    }
    .new-list-input:focus { border-color: #3b82f6; }
    .new-list-input-btns { display: flex; gap: 6px; }
    .nlb { font-size: 0.78rem; padding: 4px 12px; border-radius: 6px; cursor: pointer; border: none; }
    .nlb-ok  { background: #2563eb; color: #fff; }
    .nlb-ok:hover { opacity: 0.88; }
    .nlb-cancel { background: rgba(255,255,255,0.07); color: #9ca3af; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 0.85rem;
      padding: 10px 18px;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>

<script src="agent-data-service.js"></script>
<script>
(() => {
  const svc = window.AgentDataService;

  // ── State ──────────────────────────────────────────────────────────────────
  let allTodos   = [];
  let knownLists = ['General'];
  let activeList = null;  // null = all
  let activeFilter = 'open'; // 'open' | 'done' | 'all'
  let editingId  = null;

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Priority labels ────────────────────────────────────────────────────────
  const PRIO = { 1: 'Low', 2: 'Normal', 3: 'High' };

  // ── Date helpers ───────────────────────────────────────────────────────────
  function isoToday() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function formatDue(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function isOverdue(dateStr) {
    if (!dateStr) return false;
    return new Date(dateStr + 'T00:00:00') < new Date(isoToday() + 'T00:00:00');
  }

  // ── Load ───────────────────────────────────────────────────────────────────
  async function load() {
    const [todos, lists] = await Promise.all([svc.fetchTodos(), svc.fetchTodoLists()]);
    allTodos = todos || [];
    knownLists = lists && lists.length ? lists : ['General'];
    // Ensure any list on todos is in knownLists
    allTodos.forEach(t => {
      if (!knownLists.includes(t.listName)) knownLists.push(t.listName);
    });
    renderAll();
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderAll() {
    renderListPanel();
    renderTodos();
  }

  function renderListPanel() {
    const container = document.getElementById('listItems');
    container.innerHTML = '';

    // "All" entry
    const allItem = document.createElement('div');
    allItem.className = 'list-item' + (activeList === null ? ' active' : '');
    const openCount = allTodos.filter(t => !t.isCompleted).length;
    allItem.innerHTML = `
      <span class="list-item-name"><span>📋</span> All</span>
      ${openCount > 0 ? `<span class="list-count">${openCount}</span>` : ''}
    `;
    allItem.addEventListener('click', () => { activeList = null; renderAll(); });
    container.appendChild(allItem);

    const div = document.createElement('div');
    div.className = 'lists-divider';
    container.appendChild(div);

    knownLists.forEach(name => {
      const count = allTodos.filter(t => t.listName === name && !t.isCompleted).length;
      const item = document.createElement('div');
      item.className = 'list-item' + (activeList === name ? ' active' : '');
      item.innerHTML = `
        <span class="list-item-name"><span>📌</span> ${name}</span>
        ${count > 0 ? `<span class="list-count">${count}</span>` : ''}
      `;
      item.addEventListener('click', () => { activeList = name; renderAll(); });
      container.appendChild(item);
    });
  }

  function renderTodos() {
    document.getElementById('listTitle').textContent = activeList || 'All Todos';

    let filtered = allTodos;
    if (activeList) filtered = filtered.filter(t => t.listName === activeList);
    if (activeFilter === 'open') filtered = filtered.filter(t => !t.isCompleted);
    else if (activeFilter === 'done') filtered = filtered.filter(t => t.isCompleted);

    // Sort: priority desc, due asc, id asc
    filtered.sort((a, b) => {
      if (a.isCompleted !== b.isCompleted) return a.isCompleted ? 1 : -1;
      if (b.priority !== a.priority) return b.priority - a.priority;
      if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      if (a.dueDate) return -1;
      if (b.dueDate) return 1;
      return a.todoId - b.todoId;
    });

    const container = document.getElementById('todoList');
    container.innerHTML = '';

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state">${activeFilter === 'done' ? 'No completed tasks.' : 'No open tasks — add one above!'}</div>`;
      return;
    }

    // Section headers when showing all
    let lastCompleted = null;
    filtered.forEach(todo => {
      if (activeFilter === 'all' && lastCompleted !== todo.isCompleted) {
        lastCompleted = todo.isCompleted;
        const hdr = document.createElement('div');
        hdr.className = 'section-hdr';
        hdr.textContent = todo.isCompleted ? 'Completed' : 'Open';
        container.appendChild(hdr);
      }
      container.appendChild(buildTodoItem(todo));
    });
  }

  function buildTodoItem(todo) {
    const item = document.createElement('div');
    item.className = 'todo-item' + (todo.isCompleted ? ' completed' : '');

    const overdue = !todo.isCompleted && isOverdue(todo.dueDate);
    const dueStr  = todo.dueDate ? formatDue(todo.dueDate) : null;

    item.innerHTML = `
      <div class="todo-check ${todo.isCompleted ? 'checked' : ''}" data-id="${todo.todoId}" title="${todo.isCompleted ? 'Mark open' : 'Mark done'}">
        ${todo.isCompleted ? '✓' : ''}
      </div>
      <div class="todo-body">
        <div class="todo-title-row">
          <span class="todo-title">${todo.title}</span>
          <span class="prio-badge prio-${todo.priority}">${PRIO[todo.priority]}</span>
        </div>
        <div class="todo-meta">
          ${todo.listName !== (activeList || todo.listName) ? `<span>${todo.listName}</span> · ` : ''}
          ${dueStr ? `<span class="${overdue ? 'todo-due-overdue' : ''}">Due ${dueStr}${overdue ? ' ⚠' : ''}</span>` : ''}
          ${todo.notes ? `<span style="color:#4b5563"> · ${todo.notes.slice(0,60)}${todo.notes.length > 60 ? '…' : ''}</span>` : ''}
        </div>
      </div>
      <div class="todo-actions">
        <button class="todo-action-btn edit-btn" data-id="${todo.todoId}">Edit</button>
        <button class="todo-action-btn del todo-del-btn" data-id="${todo.todoId}">Del</button>
      </div>
    `;

    // Toggle complete
    item.querySelector('.todo-check').addEventListener('click', async () => {
      await svc.completeTodo(todo.todoId, !todo.isCompleted);
      await load();
    });

    // Edit
    item.querySelector('.edit-btn').addEventListener('click', () => openEditModal(todo));

    // Delete
    item.querySelector('.todo-del-btn').addEventListener('click', async () => {
      if (!confirm(`Delete "${todo.title}"?`)) return;
      const res = await svc.deleteTodo(todo.todoId);
      if (res.ok) { showToast('Deleted'); await load(); }
    });

    return item;
  }

  // ── Quick-add ──────────────────────────────────────────────────────────────
  document.getElementById('qaAddBtn').addEventListener('click', addTodo);
  document.getElementById('qaTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  async function addTodo() {
    const title = document.getElementById('qaTitle').value.trim();
    const due   = document.getElementById('qaDate').value || null;
    const prio  = parseInt(document.getElementById('qaPrio').value, 10);
    const list  = activeList || 'General';

    if (!title) { showToast('Title is required'); return; }

    const btn = document.getElementById('qaAddBtn');
    btn.disabled = true;

    const res = await svc.createTodo({ title, dueDate: due, priority: prio, listName: list });
    btn.disabled = false;

    if (res.ok) {
      document.getElementById('qaTitle').value = '';
      document.getElementById('qaDate').value = '';
      showToast('Task added');
      await load();
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.error || 'Failed to add task');
    }
  }

  // ── Edit modal ─────────────────────────────────────────────────────────────
  function openEditModal(todo) {
    editingId = todo.todoId;
    document.getElementById('editTitle').value = todo.title;
    document.getElementById('editNotes').value = todo.notes || '';
    document.getElementById('editDue').value   = todo.dueDate ? todo.dueDate.slice(0, 10) : '';
    document.getElementById('editPrio').value  = todo.priority;

    // Populate list options
    const listSel = document.getElementById('editList');
    listSel.innerHTML = '';
    const available = [...new Set([...knownLists, todo.listName])];
    available.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l;
      opt.textContent = l;
      if (l === todo.listName) opt.selected = true;
      listSel.appendChild(opt);
    });

    document.getElementById('editModal').classList.add('open');
  }

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('editModal').addEventListener('click', e => {
    if (e.target === document.getElementById('editModal')) closeModal();
  });
  function closeModal() {
    document.getElementById('editModal').classList.remove('open');
    editingId = null;
  }

  document.getElementById('modalSave').addEventListener('click', async () => {
    if (!editingId) return;
    const title = document.getElementById('editTitle').value.trim();
    const notes = document.getElementById('editNotes').value.trim();
    const due   = document.getElementById('editDue').value || null;
    const list  = document.getElementById('editList').value;
    const prio  = parseInt(document.getElementById('editPrio').value, 10);

    if (!title) { showToast('Title is required'); return; }

    const res = await svc.updateTodo(editingId, {
      title,
      notes: notes || null,
      dueDate: due,
      listName: list,
      priority: prio
    });

    if (res.ok) {
      closeModal();
      showToast('Saved');
      await load();
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.error || 'Failed to save');
    }
  });

  // ── New list ───────────────────────────────────────────────────────────────
  document.getElementById('newListToggle').addEventListener('click', () => {
    document.getElementById('newListWrap').classList.add('show');
    document.getElementById('newListInput').focus();
  });
  document.getElementById('newListCancel').addEventListener('click', () => {
    document.getElementById('newListWrap').classList.remove('show');
    document.getElementById('newListInput').value = '';
  });
  document.getElementById('newListOk').addEventListener('click', () => {
    const name = document.getElementById('newListInput').value.trim();
    if (!name) return;
    if (!knownLists.includes(name)) knownLists.push(name);
    document.getElementById('newListWrap').classList.remove('show');
    document.getElementById('newListInput').value = '';
    activeList = name;
    renderAll();
  });
  document.getElementById('newListInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newListOk').click();
    if (e.key === 'Escape') document.getElementById('newListCancel').click();
  });

  // ── Filter buttons ─────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTodos();
    });
  });

  // ── Sidebar toggle ─────────────────────────────────────────────────────────
  const sidebarEl = document.getElementById('appSidebar');
  const mainEl    = document.getElementById('appMain');
  const overlay   = document.getElementById('sidebarOverlay');
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    sidebarEl.classList.toggle('open');
    mainEl.classList.toggle('sidebar-open');
    overlay.classList.toggle('active');
  });
  overlay.addEventListener('click', () => {
    sidebarEl.classList.remove('open');
    mainEl.classList.remove('sidebar-open');
    overlay.classList.remove('active');
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  load();
})();
</script>
</body>
</html>
