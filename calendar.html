<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PantryScan – Calendar</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="stylesheet" href="ui/theme.css" />
  <style>
    /* ── Layout ─────────────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      height: calc(100vh - 0px);
      overflow: hidden;
    }

    /* ── Left panel ──────────────────────────────────────────────────────── */
    .cal-panel {
      width: 280px;
      min-width: 280px;
      background: #0d1320;
      border-right: 1px solid rgba(59,130,246,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .cal-panel-hdr {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(59,130,246,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .cal-panel-hdr h2 {
      font-size: 0.97rem;
      font-weight: 700;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .cal-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }
    .cal-panel-body::-webkit-scrollbar { width: 4px; }
    .cal-panel-body::-webkit-scrollbar-track { background: transparent; }
    .cal-panel-body::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 2px; }

    /* Quick-add form */
    .quick-add {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .quick-add h3 {
      font-size: 0.82rem;
      font-weight: 600;
      color: #93c5fd;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .qa-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 7px;
      color: #e5e7eb;
      font-size: 0.85rem;
      padding: 7px 10px;
      margin-bottom: 7px;
      outline: none;
    }
    .qa-input:focus { border-color: #3b82f6; }
    .qa-row { display: flex; gap: 6px; margin-bottom: 7px; }
    .qa-row .qa-input { margin-bottom: 0; }
    .qa-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 7px;
      color: #e5e7eb;
      font-size: 0.85rem;
      padding: 7px 10px;
      margin-bottom: 7px;
      outline: none;
    }
    .qa-select option { background: #0d1320; }
    .qa-check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.83rem;
      color: #9ca3af;
    }
    .qa-btn {
      width: 100%;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .qa-btn:hover { opacity: 0.88; }
    .qa-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Upcoming events list */
    .upcoming-hdr {
      font-size: 0.82rem;
      font-weight: 700;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
      margin-top: 4px;
    }
    .event-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 9px;
      padding: 9px 11px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .event-card:hover { border-color: rgba(59,130,246,0.4); background: rgba(255,255,255,0.07); }
    .event-card .ev-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .event-card .ev-title {
      font-size: 0.87rem;
      font-weight: 600;
      color: #e5e7eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-card .ev-meta {
      font-size: 0.76rem;
      color: #9ca3af;
      margin-top: 2px;
    }
    .event-card .ev-del {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: #ef444480;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .15s;
    }
    .event-card:hover .ev-del { opacity: 1; }
    .event-card .ev-del:hover { color: #ef4444; background: rgba(239,68,68,.1); }
    .empty-state {
      text-align: center;
      color: #4b5563;
      font-size: 0.82rem;
      padding: 20px 0;
    }

    /* ── Calendar grid ───────────────────────────────────────────────────── */
    .cal-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 18px 20px;
    }
    .cal-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .cal-toolbar h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e5e7eb;
      flex: 1;
    }
    .cal-nav-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 8px;
      color: #93c5fd;
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 14px;
      transition: background .15s;
    }
    .cal-nav-btn:hover { background: rgba(59,130,246,0.15); }
    .today-btn {
      background: rgba(37,99,235,0.2);
      border: 1px solid rgba(59,130,246,0.4);
      border-radius: 8px;
      color: #60a5fa;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 14px;
      transition: background .15s;
    }
    .today-btn:hover { background: rgba(37,99,235,0.35); }

    .cal-grid-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
      flex-shrink: 0;
    }
    .cal-dow-cell {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 4px 0;
    }
    .cal-days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      gap: 3px;
      flex: 1;
      min-height: 0;
    }
    .cal-day {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(59,130,246,0.1);
      border-radius: 8px;
      padding: 5px 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      flex-direction: column;
    }
    .cal-day:hover { border-color: rgba(59,130,246,0.35); background: rgba(255,255,255,0.06); }
    .cal-day.other-month { opacity: 0.35; }
    .cal-day.today { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
    .cal-day.today .day-num { color: #60a5fa; font-weight: 700; }
    .day-num {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-bottom: 2px;
      flex-shrink: 0;
    }
    .day-events {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }
    .day-event-pill {
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
      font-weight: 500;
    }
    .day-event-more {
      font-size: 0.66rem;
      color: #6b7280;
      margin-top: 1px;
    }

    /* ── Edit modal ──────────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #0f1a2e;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 14px;
      padding: 24px 28px;
      width: 380px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h2 { font-size: 1rem; font-weight: 700; color: #e5e7eb; margin-bottom: 16px; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 0.78rem; color: #9ca3af; margin-bottom: 4px; }
    .modal-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 7px;
      color: #e5e7eb;
      font-size: 0.87rem;
      padding: 8px 10px;
      outline: none;
    }
    .modal-input:focus { border-color: #3b82f6; }
    .modal-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 7px;
      color: #e5e7eb;
      font-size: 0.87rem;
      padding: 8px 10px;
      outline: none;
    }
    .modal-select option { background: #0d1320; }
    .modal-check-row { display: flex; align-items: center; gap: 8px; font-size: 0.83rem; color: #9ca3af; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
    .btn-cancel {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 7px 18px;
    }
    .btn-save {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none;
      border-radius: 7px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 18px;
    }
    .btn-save:hover { opacity: 0.88; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 0.85rem;
      padding: 10px 18px;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>

<script src="agent-data-service.js"></script>
<script>
(() => {
  const svc = window.AgentDataService;

  // ── State ──────────────────────────────────────────────────────────────────
  let allEvents = [];
  let viewYear, viewMonth; // 0-indexed month
  let editingEventId = null;

  const today = new Date();
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();

  // ── Category colors ────────────────────────────────────────────────────────
  const CAT_COLORS = {
    Family:  '#3b82f6',
    School:  '#8b5cf6',
    Medical: '#ef4444',
    Work:    '#f59e0b',
    Social:  '#10b981',
    Other:   '#6b7280',
    '':      '#3b82f6'
  };
  function catColor(cat) { return CAT_COLORS[cat] || '#3b82f6'; }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function toLocalDatetimeValue(dt) {
    const d = new Date(dt);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function formatDate(dt) {
    return new Date(dt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function formatTime(dt) {
    const d = new Date(dt);
    return d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  }
  function isoDate(dateObj) {
    const pad = n => String(n).padStart(2, '0');
    return `${dateObj.getFullYear()}-${pad(dateObj.getMonth()+1)}-${pad(dateObj.getDate())}`;
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Load events ────────────────────────────────────────────────────────────
  async function loadEvents() {
    const data = await svc.fetchEvents();
    allEvents = data || [];
    renderAll();
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderAll() {
    renderCalendar();
    renderUpcoming();
  }

  function renderCalendar() {
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('monthTitle').textContent = `${monthNames[viewMonth]} ${viewYear}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

    // Event lookup by date string
    const byDate = {};
    allEvents.forEach(ev => {
      const key = isoDate(new Date(ev.startDate));
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(ev);
    });

    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day';

      let cellDate, isCurrentMonth = true;
      if (i < firstDay) {
        cellDate = new Date(viewYear, viewMonth - 1, daysInPrev - firstDay + i + 1);
        isCurrentMonth = false;
        cell.classList.add('other-month');
      } else if (i >= firstDay + daysInMonth) {
        cellDate = new Date(viewYear, viewMonth + 1, i - firstDay - daysInMonth + 1);
        isCurrentMonth = false;
        cell.classList.add('other-month');
      } else {
        cellDate = new Date(viewYear, viewMonth, i - firstDay + 1);
      }

      const isToday = isoDate(cellDate) === isoDate(today);
      if (isToday) cell.classList.add('today');

      const dayNum = document.createElement('div');
      dayNum.className = 'day-num';
      dayNum.textContent = cellDate.getDate();
      cell.appendChild(dayNum);

      const key = isoDate(cellDate);
      const dayEvs = byDate[key] || [];
      const evContainer = document.createElement('div');
      evContainer.className = 'day-events';

      const maxShow = 3;
      dayEvs.slice(0, maxShow).forEach(ev => {
        const pill = document.createElement('div');
        pill.className = 'day-event-pill';
        pill.style.background = ev.color || catColor(ev.category);
        pill.textContent = ev.title;
        pill.title = ev.title;
        pill.addEventListener('click', e => { e.stopPropagation(); openEditModal(ev); });
        evContainer.appendChild(pill);
      });
      if (dayEvs.length > maxShow) {
        const more = document.createElement('div');
        more.className = 'day-event-more';
        more.textContent = `+${dayEvs.length - maxShow} more`;
        evContainer.appendChild(more);
      }
      cell.appendChild(evContainer);

      // Click on empty day → pre-fill quick-add date
      cell.addEventListener('click', () => {
        const inp = document.getElementById('qaDate');
        inp.value = isoDate(cellDate);
        document.getElementById('qaTitle').focus();
      });

      grid.appendChild(cell);
    }
  }

  function renderUpcoming() {
    const list = document.getElementById('upcomingList');
    const now = new Date();
    const upcoming = allEvents
      .filter(ev => new Date(ev.startDate) >= now)
      .sort((a, b) => new Date(a.startDate) - new Date(b.startDate))
      .slice(0, 15);

    if (!upcoming.length) {
      list.innerHTML = '<div class="empty-state">No upcoming events.</div>';
      return;
    }

    list.innerHTML = '';
    upcoming.forEach(ev => {
      const card = document.createElement('div');
      card.className = 'event-card';

      const color = ev.color || catColor(ev.category);
      card.innerHTML = `
        <div style="display:flex;align-items:center;overflow:hidden;">
          <span class="ev-dot" style="background:${color}"></span>
          <span class="ev-title">${ev.title}</span>
        </div>
        <div class="ev-meta">${formatDate(ev.startDate)}${ev.allDay ? ' · All day' : ' · ' + formatTime(ev.startDate)}</div>
        <button class="ev-del" data-id="${ev.eventId}" title="Delete">✕</button>
      `;
      card.addEventListener('click', e => {
        if (!e.target.closest('.ev-del')) openEditModal(ev);
      });
      card.querySelector('.ev-del').addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm(`Delete "${ev.title}"?`)) return;
        await svc.deleteEvent(ev.eventId);
        showToast('Event deleted');
        await loadEvents();
      });
      list.appendChild(card);
    });
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  document.getElementById('prevBtn').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    renderCalendar();
  });

  // ── Quick-add ──────────────────────────────────────────────────────────────
  document.getElementById('qaAddBtn').addEventListener('click', async () => {
    const title = document.getElementById('qaTitle').value.trim();
    const date = document.getElementById('qaDate').value;
    const time = document.getElementById('qaTime').value || '00:00';
    const category = document.getElementById('qaCategory').value;
    const allDay = document.getElementById('qaAllDay').checked;

    if (!title) { showToast('Title is required'); return; }
    if (!date)  { showToast('Date is required'); return; }

    const btn = document.getElementById('qaAddBtn');
    btn.disabled = true;

    const startDate = allDay ? `${date}T00:00:00` : `${date}T${time}:00`;
    const res = await svc.createEvent({ title, startDate, allDay, category: category || null });

    btn.disabled = false;
    if (res.ok) {
      document.getElementById('qaTitle').value = '';
      document.getElementById('qaDate').value = '';
      document.getElementById('qaTime').value = '';
      document.getElementById('qaCategory').value = '';
      document.getElementById('qaAllDay').checked = false;
      showToast('Event added');
      await loadEvents();
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.error || 'Failed to add event');
    }
  });

  // ── Edit modal ─────────────────────────────────────────────────────────────
  function openEditModal(ev) {
    editingEventId = ev.eventId;
    document.getElementById('modalTitle').textContent = 'Edit Event';
    document.getElementById('editTitle').value = ev.title;
    document.getElementById('editStart').value = toLocalDatetimeValue(ev.startDate);
    document.getElementById('editEnd').value = ev.endDate ? toLocalDatetimeValue(ev.endDate) : '';
    document.getElementById('editAllDay').checked = ev.allDay;
    document.getElementById('editCategory').value = ev.category || '';
    document.getElementById('editDesc').value = ev.description || '';
    document.getElementById('editModal').classList.add('open');
  }

  document.getElementById('modalCancel').addEventListener('click', () => {
    document.getElementById('editModal').classList.remove('open');
    editingEventId = null;
  });

  document.getElementById('editModal').addEventListener('click', e => {
    if (e.target === document.getElementById('editModal')) {
      document.getElementById('editModal').classList.remove('open');
      editingEventId = null;
    }
  });

  document.getElementById('modalSave').addEventListener('click', async () => {
    if (!editingEventId) return;
    const title = document.getElementById('editTitle').value.trim();
    const start = document.getElementById('editStart').value;
    const end   = document.getElementById('editEnd').value;
    const allDay = document.getElementById('editAllDay').checked;
    const category = document.getElementById('editCategory').value;
    const desc = document.getElementById('editDesc').value.trim();

    if (!title) { showToast('Title is required'); return; }
    if (!start) { showToast('Start date is required'); return; }

    const res = await svc.updateEvent(editingEventId, {
      title,
      startDate: new Date(start).toISOString(),
      endDate: end ? new Date(end).toISOString() : null,
      allDay,
      category: category || null,
      description: desc || null
    });

    if (res.ok) {
      document.getElementById('editModal').classList.remove('open');
      editingEventId = null;
      showToast('Event updated');
      await loadEvents();
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.error || 'Failed to update');
    }
  });

  // ── Sidebar toggle ─────────────────────────────────────────────────────────
  const sidebarEl = document.getElementById('appSidebar');
  const mainEl    = document.getElementById('appMain');
  const overlay   = document.getElementById('sidebarOverlay');
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    sidebarEl.classList.toggle('open');
    mainEl.classList.toggle('sidebar-open');
    overlay.classList.toggle('active');
  });
  overlay.addEventListener('click', () => {
    sidebarEl.classList.remove('open');
    mainEl.classList.remove('sidebar-open');
    overlay.classList.remove('active');
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  // Set default date on quick-add to today
  document.getElementById('qaDate').value = isoDate(today);
  loadEvents();
})();
</script>
</body>
</html>
