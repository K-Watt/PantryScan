<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PantryScan — Sign In</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="stylesheet" href="ui/theme.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #1a2744 0%, #0a1929 40%, #050e1a 90%);
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 1.25rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      color: #e5e7eb;
    }

    .auth-card h1 {
      margin: 0 0 1.75rem;
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      color: #ffffff;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.75rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 4px;
    }

    .tabs button {
      flex: 1;
      background: none;
      border: none;
      padding: .6rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: rgba(147, 197, 253, 0.7);
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }

    .tabs button.active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: .4rem;
      font-size: .88rem;
      font-weight: 700;
      color: #93c5fd;
    }

    .form-group input {
      width: 100%;
      padding: .7rem 1rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #ffffff;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.10);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .form-group input::placeholder {
      color: rgba(147, 197, 253, 0.45);
    }

    .btn-primary {
      width: 100%;
      padding: .8rem;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: .75rem;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }

    .error-msg {
      color: #fca5a5;
      font-size: .85rem;
      margin-top: .5rem;
      display: none;
      background: rgba(220, 38, 38, 0.12);
      border: 1px solid rgba(220, 38, 38, 0.35);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .success-msg {
      color: #34d399;
      font-size: .85rem;
      margin-top: .5rem;
      display: none;
      background: rgba(5, 150, 105, 0.12);
      border: 1px solid rgba(5, 150, 105, 0.35);
      border-radius: 8px;
      padding: 8px 12px;
    }

    #register-section { display: none; }
  </style>
</head>
<body>
<div class="auth-card">
  <h1>🥗 PantryScan</h1>

  <div class="tabs">
    <button class="active" id="tab-login" onclick="showTab('login')">Sign In</button>
    <button id="tab-register" onclick="showTab('register')">Create Account</button>
  </div>

  <!-- Login -->
  <div id="login-section">
    <div class="form-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password" />
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn-primary" onclick="login()">Sign In</button>
  </div>

  <!-- Register -->
  <div id="register-section">
    <div class="form-group">
      <label for="reg-name">Your Name</label>
      <input type="text" id="reg-name" placeholder="First name or nickname" autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password" />
    </div>
    <div class="error-msg" id="reg-error"></div>
    <div class="success-msg" id="reg-success"></div>
    <button class="btn-primary" onclick="register()">Create Account</button>
  </div>
</div>

<script>
  const API = 'http://localhost:5169';

  function showTab(tab) {
    document.getElementById('login-section').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('register-section').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    if (!email || !password) { showError(errEl, 'Email and password are required.'); return; }

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (res.status === 401) { showError(errEl, 'Incorrect email or password.'); return; }
      if (!res.ok) { const d = await res.json(); showError(errEl, d.error || 'Login failed.'); return; }

      const data = await res.json();
      localStorage.setItem('pantryscan_session', data.sessionToken);
      localStorage.setItem('pantryscan_user', JSON.stringify({ userId: data.userId, displayName: data.displayName, role: data.role }));
      window.location.href = 'index.html';
    } catch {
      showError(errEl, 'Could not connect to API. Is it running?');
    }
  }

  async function register() {
    const displayName = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errEl = document.getElementById('reg-error');
    const successEl = document.getElementById('reg-success');
    errEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!displayName || !email || !password) { showError(errEl, 'All fields are required.'); return; }

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ displayName, email, password })
      });

      if (res.status === 409) { showError(errEl, 'An account with that email already exists.'); return; }
      if (!res.ok) { const d = await res.json(); showError(errEl, d.error || 'Registration failed.'); return; }

      successEl.textContent = 'Account created! Signing you in...';
      successEl.style.display = 'block';

      // Auto-login after register
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = password;
      setTimeout(() => { showTab('login'); login(); }, 800);
    } catch {
      showError(errEl, 'Could not connect to API. Is it running?');
    }
  }

  function showError(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
  }

  // If already logged in, redirect
  if (localStorage.getItem('pantryscan_session')) {
    window.location.href = 'index.html';
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('login-section').style.display !== 'none') login();
      else register();
    }
  });
</script>
</body>
</html>
